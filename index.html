    <style>

        .header-container {

            justify-content: space-between;

            gap: 1rem;
        }
        .logo h1 {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.3px;
        }
        .logo span {
            color: #4bc0c0;

            font-weight: normal;
            display: block;
        }
        .trust-badge {
            background: #2c5f2d;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .trust-badge i {
            margin-right: 6px;
        }
        .report-center {

            border-radius: 30px;

        /* main layout */

            max-width: 1600px;

            flex-wrap: wrap;

        }
        .listings-panel {

            min-width: 280px;

            overflow-y: auto;

            box-shadow: 0 6px 14px rgba(0,0,0,0.08);

        #map {
            height: 100%;
            width: 100%;
        }

            border-radius: 24px;

            gap: 12px;
            margin-top: 14px;
            flex-wrap: wrap;
        }

            background: #f0f4f8;

            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        hr {
            margin: 12px 0;
            border-color: #edf2f7;
        }
        .no-listings {

            padding: 2rem;

        .toast-msg {
            position: fixed;
            bottom: 20px;
            right: 20px;

            color: white;
            padding: 12px 22px;

            .dashboard {

            }
            .map-panel {

            }

            }
            .control-panel {

            }
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            padding: 1.5rem;
            color: #5a6e7c;
        }
    </style>
</head>

<div class="app-container">

    // global state
    let map;
    let markers = [];
    let currentListings = [...listingsData];
    let workplaceCoords = null;   // {lat, lng}
    let chartModalActive = null;   // For price history chart

    // Helper: show floating toast
    function showToast(message, isError = false) {
        const existingToast = document.querySelector('.toast-msg');
        if(existingToast) existingToast.remove();
        const toast = document.createElement('div');
        toast.className = 'toast-msg';
        toast.style.backgroundColor = isError ? '#b91c1c' : '#1e5f6e';
        toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3500);
    }

    // Helper: compute driving time (minutes) between two lat/lng (haversine, 30km/h)
    function computeDriveMinutes(lat1, lng1, lat2, lng2) {
        const R = 6371; // km
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lng2 - lng1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
                  Math.sin(dLon/2) * Math.sin(dLon/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        const distance = R * c;
        const avgSpeedKmph = 30; // urban driving
        const minutes = (distance / avgSpeedKmph) * 60;
        return Math.round(minutes);
    }

    // Update all listing cards with commute times if workplaceCoords exists
    function refreshCommuteTimes() {
        if (!workplaceCoords) {
            // remove commute chips or show none
            document.querySelectorAll('.commute-chip').forEach(chip => chip.remove());
            return;
        }
        for (let listing of currentListings) {
            const minutes = computeDriveMinutes(workplaceCoords.lat, workplaceCoords.lng, listing.lat, listing.lng);
            const chipDiv = document.getElementById(`commute-${listing.id}`);
            if (chipDiv) {
                chipDiv.innerHTML = `<i class="fas fa-clock"></i> ${minutes} min drive (work)`;
            }
        }
    }

    // Render listings on left panel (cards) + commute times if workplace active
    function renderListingCards() {
        const container = document.getElementById('listingsContainer');
        if (!currentListings.length) {
            container.innerHTML = '<div class="no-listings"><i class="fas fa-building"></i> No properties in current area. Reset or zoom out.</div>';
            return;
        }
        container.innerHTML = '';
        currentListings.forEach(listing => {
            const card = document.createElement('div');
            card.className = 'listing-card';
            const pricePerSqft = (listing.price / listing.sqft).toFixed(2);
            const verifiedHtml = `<span class="verified-badge"><i class="fas fa-check-circle"></i> VERIFIED · No hidden fees</span>`;
            const commuteHtml = workplaceCoords ? 
                `<div id="commute-${listing.id}" class="commute-chip"><i class="fas fa-car"></i> Calculating...</div>` : 
                `<div class="commute-chip"><i class="fas fa-map-pin"></i> Set work address</div>`;
            
            card.innerHTML = `
                <div class="listing-header">
                    <div><strong>${listing.title}</strong> ${verifiedHtml}</div>
                    <div class="price">$${listing.price.toLocaleString()}<small>/mo</small></div>
                </div>
                <div class="address"><i class="fas fa-location-dot"></i> ${listing.address}</div>
                <div class="details">
                    <span><i class="fas fa-ruler-combined"></i> ${listing.sqft} sqft</span>
                    <span><i class="fas fa-bed"></i> ${listing.bedrooms} BR</span>
                    <span><i class="fas fa-dollar-sign"></i> $${pricePerSqft}/sqft</span>
                    <span><i class="fas fa-shield"></i> deposit: $${listing.deposit}</span>
                </div>
                <div class="details" style="background:#f9fafb; border-radius: 20px; padding: 5px 0;">
                    <span><i class="fas fa-water"></i> ${listing.utilities}</span>
                </div>
                <div style="display:flex; justify-content: space-between; align-items:center; flex-wrap:wrap;">
                    ${commuteHtml}
                </div>
                <hr>
                <div class="card-actions">
                    <button class="btn-sm price-history-btn" data-id="${listing.id}"><i class="fas fa-chart-simple"></i> Price history</button>
                    <button class="btn-sm btn-danger report-scam-btn" data-id="${listing.id}" data-title="${listing.title}"><i class="fas fa-flag-triangle"></i> Report scam</button>
                </div>
            `;
            container.appendChild(card);
        });
        // attach price history event listeners
        document.querySelectorAll('.price-history-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.dataset.id);
                const listing = listingsData.find(l => l.id === id);
                if (listing) showPriceHistoryModal(listing);
            });
        });
        document.querySelectorAll('.report-scam-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.dataset.id);
                const title = btn.dataset.title;
                // "Report scam" system feature - full transparency
                showToast(`🚨 Scam report submitted for "${title}". Our trust & safety team will review within 2h.`, false);
                // Additional optional: log to console for demonstration
                console.log(`[SCAM REPORT] listing ID: ${id}, Title: ${title} - reported at ${new Date().toLocaleString()}`);
                // could notify admin, but robust frontend alert
            });
        });
        // after render cards, refresh commute chips if workplace exists
        if (workplaceCoords) {
            refreshCommuteTimes();
        } else {
            // make sure all chips have default text
            currentListings.forEach(l => {
                const chip = document.getElementById(`commute-${l.id}`);
                if(chip) chip.innerHTML = `<i class="fas fa-map-pin"></i> Set work address for commute`;
            });
        }
    }

    // Price history modal with Chart.js per location
    let currentChart = null;
    function showPriceHistoryModal(listing) {
        // remove existing modal if any
        const existingModal = document.getElementById('priceHistoryModal');
        if(existingModal) existingModal.remove();

        const modalDiv = document.createElement('div');
        modalDiv.id = 'priceHistoryModal';
        modalDiv.style.position = 'fixed';
        modalDiv.style.top = '0'; modalDiv.style.left = '0';
        modalDiv.style.width = '100%'; modalDiv.style.height = '100%';
        modalDiv.style.backgroundColor = 'rgba(0,0,0,0.6)';
        modalDiv.style.display = 'flex';
        modalDiv.style.alignItems = 'center';
        modalDiv.style.justifyContent = 'center';
        modalDiv.style.zIndex = '3000';
        modalDiv.style.backdropFilter = 'blur(3px)';
        
        const modalContent = document.createElement('div');
        modalContent.style.background = 'white';
        modalContent.style.borderRadius = '32px';
        modalContent.style.width = '90%';
        modalContent.style.maxWidth = '500px';
        modalContent.style.padding = '1.5rem';
        modalContent.style.boxShadow = '0 20px 35px rgba(0,0,0,0.2)';
        modalContent.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3><i class="fas fa-chart-line"></i> Rent history: ${listing.title}</h3>
                <button id="closeModalBtn" style="background: #cbd5e1; padding: 6px 14px;">✖ Close</button>
            </div>

            <canvas id="priceChartCanvas" width="400" height="250" style="margin-top: 16px;"></canvas>
            <div style="background:#f1f5f9; border-radius: 20px; padding: 12px; margin-top: 18px;">
                <i class="fas fa-info-circle"></i> <strong>Transparent data:</strong> No hidden fees. All costs disclosed (deposit, utilities).
                <div><small>Monthly rent + current fees = total ${listing.price + (listing.utilities.includes('extra') ? 90 : 0)} (est.)</small></div>
            </div>
        `;
        modalDiv.appendChild(modalContent);
        document.body.appendChild(modalDiv);
        
        // draw Chart
        const ctx = document.getElementById('priceChartCanvas').getContext('2d');
        if (currentChart) currentChart.destroy();
        currentChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: listing.historyMonths,
                datasets: [{
                    label: 'Monthly Rent ($)',
                    data: listing.priceHistory,
                    borderColor: '#2c9c6e',
                    backgroundColor: 'rgba(44,156,110,0.1)',
                    fill: true,
                    tension: 0.3,
                    pointBackgroundColor: '#1e5f6e',
                    pointRadius: 4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    tooltip: { callbacks: { label: (ctx) => `$${ctx.raw} USD` } }
                }
            }
        });
        document.getElementById('closeModalBtn').onclick = () => modalDiv.remove();
        modalDiv.addEventListener('click', (e) => { if(e.target === modalDiv) modalDiv.remove(); });
    }

    // Map initialization (leaflet)
    function initMap() {
        map = L.map('map').setView([37.7749, -122.4194], 12);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> & CartoDB',
            subdomains: 'abcd',
            maxZoom: 18
        }).addTo(map);
        addMarkersToMap(currentListings);
    }

    function addMarkersToMap(listingsArr) {
        // clear existing markers
        markers.forEach(marker => map.removeLayer(marker));
        markers = [];
        listingsArr.forEach(listing => {
            const popupContent = `
                <b>${listing.title}</b><br>
                <i class="fas fa-map-marker-alt"></i> ${listing.address}<br>
                💰 $${listing.price}/mo<br>
                <span style="color:#2b6e4f;">✓ Verified</span><br>
                <button id="popupReportBtn-${listing.id}" style="background:#f0f2f5; border:none; border-radius:20px; padding:4px 12px; margin-top:6px; font-size:12px;">🚨 Report scam</button>
            `;
            const marker = L.marker([listing.lat, listing.lng]).addTo(map);
            marker.bindPopup(popupContent);
            marker.on('popupopen', () => {
                const btn = document.getElementById(`popupReportBtn-${listing.id}`);
                if(btn) btn.onclick = () => {
                    showToast(`📢 Scam reported for ${listing.title}. Trust team notified.`, false);
                };
            });
            markers.push(marker);
        });
    }

    // filter listings by map bounds (map-based search)
    function filterByMapBounds() {
        if (!map) return;
        const bounds = map.getBounds();
        const filtered = listingsData.filter(listing => bounds.contains([listing.lat, listing.lng]));
        currentListings = [...filtered];
        renderListingCards();
        addMarkersToMap(currentListings);
        if(filtered.length === 0) showToast("No verified listings in current map view. Try moving map.", false);
        else showToast(`📍 Found ${filtered.length} verified properties in this area`, false);
    }

    function resetAllListings() {
        currentListings = [...listingsData];
        renderListingCards();
        addMarkersToMap(currentListings);
        if (workplaceCoords) refreshCommuteTimes();
        showToast("All verified listings restored", false);
        map.setView([37.7749, -122.4194], 12);
    }

    // geocoding helper (Nominatim)
    async function geocodeAddress(address) {
        const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}&limit=1`;
        try {
            const response = await fetch(url);
            const data = await response.json();
            if (data && data.length) {
                return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
            } else return null;
        } catch(e) { return null; }
    }

    // location search & pan map (map based search)
    async function searchLocationAndMove() {
        const query = document.getElementById('locationSearchInput').value.trim();
        if (!query) { showToast("Enter a location (city, zip)", true); return; }
        const coords = await geocodeAddress(query);
        if (coords) {
            map.setView([coords.lat, coords.lng], 13);
            showToast(`Map centered on "${query}"`, false);
        } else {
            showToast("Location not found. Try another name.", true);
        }
    }

    // commute time logic: set workplace and update all cards & chips
    async function setWorkplaceAndUpdateCommutes() {
        const workAddr = document.getElementById('workAddressInput').value.trim();
        if (!workAddr) { showToast("Please enter work address", true); return; }
        const geo = await geocodeAddress(workAddr);
        if (!geo) { showToast("Could not locate work address.", true); return; }
        workplaceCoords = { lat: geo.lat, lng: geo.lng };
        showToast(`Workplace set: ${workAddr}. Commute estimates updated.`, false);
        // refresh cards commute labels
        renderListingCards();   // re-render to ensure fresh chips, but keeps events
        refreshCommuteTimes();
        // Also update map markers showing optional? Great
    }

    // event binding & initial rendering
    document.addEventListener('DOMContentLoaded', () => {
        initMap();
        renderListingCards();
        addMarkersToMap(currentListings);
        
        // attach buttons
        document.getElementById('filterMapBoundsBtn').addEventListener('click', filterByMapBounds);
        document.getElementById('resetListingsBtn').addEventListener('click', resetAllListings);
        document.getElementById('searchLocationBtn').addEventListener('click', searchLocationAndMove);
        document.getElementById('setCommuteBtn').addEventListener('click', setWorkplaceAndUpdateCommutes);
        
        // optional: if user hits enter for work address
        document.getElementById('workAddressInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') setWorkplaceAndUpdateCommutes();
        });
        document.getElementById('locationSearchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchLocationAndMove();
        });
    });
</script>
</body>
</html>
